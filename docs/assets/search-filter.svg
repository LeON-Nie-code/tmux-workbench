<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">Tmux Workbench structured search</title>
  <desc id="desc">A terminal screenshot-style image showing structured search filters in Tmux Workbench.</desc>
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .panel { fill: #111820; stroke: #30363d; stroke-width: 2; }
      .text { fill: #e6edf3; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .muted { fill: #8b949e; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .label { fill: #8b949e; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-weight: 700; }
      .cyan { fill: #56d4dd; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-weight: 800; }
      .green { fill: #7ee787; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .yellow { fill: #f2cc60; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    </style>
  </defs>
  <rect width="1280" height="520" rx="18" class="bg"/>
  <rect x="38" y="36" width="1204" height="448" rx="14" class="panel"/>

  <text x="72" y="78" font-size="22" class="cyan">Search by workspace memory</text>
  <text x="72" y="116" font-size="17" class="muted">Plain text and filters can be mixed in the same query.</text>

  <rect x="72" y="148" width="1136" height="58" rx="8" fill="#0f151d" stroke="#30363d"/>
  <text x="96" y="184" font-size="22" class="text">/ server:prod status:active tag:backend git:dirty</text>

  <text x="96" y="248" font-size="15" class="label">WORKSPACE</text>
  <text x="326" y="248" font-size="15" class="label">SERVER</text>
  <text x="516" y="248" font-size="15" class="label">GIT</text>
  <text x="760" y="248" font-size="15" class="label">PATH</text>

  <rect x="82" y="266" width="1110" height="40" rx="6" fill="#56d4dd"/>
  <text x="100" y="292" font-size="16" fill="#0d1117" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="800">&gt; api-server</text>
  <text x="326" y="292" font-size="16" fill="#0d1117" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">prod</text>
  <text x="516" y="292" font-size="16" fill="#0d1117" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">main@d43063f dirty</text>
  <text x="760" y="292" font-size="16" fill="#0d1117" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">/srv/api</text>

  <text x="100" y="344" font-size="16" class="text">worker</text>
  <text x="326" y="344" font-size="16" class="muted">prod</text>
  <text x="516" y="344" font-size="16" class="yellow">release@a81f222 dirty</text>
  <text x="760" y="344" font-size="16" class="muted">/srv/worker</text>

  <text x="100" y="394" font-size="16" class="text">billing</text>
  <text x="326" y="394" font-size="16" class="muted">prod</text>
  <text x="516" y="394" font-size="16" class="green">main@91c2f04 clean</text>
  <text x="760" y="394" font-size="16" class="muted">/srv/billing</text>

  <text x="72" y="458" font-size="15" class="muted">Filters: server, status, tag, git. Git supports dirty, clean, remote, ahead, behind, branch, commit, and URL text.</text>
</svg>
